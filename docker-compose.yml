services:
  db:
    image: pgvector/pgvector:pg16
    container_name: cxallies-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cxallies
      POSTGRES_PASSWORD: cxallies_dev
      POSTGRES_DB: cxallies
    ports:
      - '5432:5432'
    volumes:
      - cxallies-db-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cxallies -d cxallies']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cxallies-db-data:
